<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinFlow — Finance Dashboard</title>
<meta name="description" content="A modern personal finance dashboard to track income, expenses and spending patterns.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bg2:#161b27;--bg3:#1e2636;
  --card:#1a2035;--card2:#212b42;
  --border:#2a3550;--border2:#3a4a6a;
  --text:#e8edf5;--text2:#8b9ab8;--text3:#5a6b8a;
  --primary:#6c63ff;--primary-dim:#4b44cc;--primary-glow:rgba(108,99,255,.2);
  --green:#22c55e;--red:#ef4444;--amber:#f59e0b;--blue:#3b82f6;
  --shadow:0 4px 24px rgba(0,0,0,.4);
  --radius:14px;--radius-sm:8px;
  --font:'Inter',sans-serif;
  --trans:.2s ease;
}
[data-theme="light"]{
  --bg:#f0f2f8;--bg2:#e8ebf3;--bg3:#dde1ed;
  --card:#fff;--card2:#f5f7fc;
  --border:#d0d7e8;--border2:#bec8df;
  --text:#1a2035;--text2:#4a5568;--text3:#8896b0;
  --shadow:0 4px 24px rgba(0,0,0,.1);
}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;width:100vw;margin:0;display:flex;overflow:hidden}
/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* Sidebar */
#sidebar{width:240px;min-width:240px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:24px 0;transition:width var(--trans),min-width var(--trans);overflow:hidden;position:relative;z-index:10}
.logo{padding:0 20px 24px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--primary),#a78bfa);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.logo-text{font-size:20px;font-weight:700;background:linear-gradient(135deg,var(--primary),#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
nav{flex:1;padding:16px 12px;display:flex;flex-direction:column;gap:4px}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:var(--radius-sm);cursor:pointer;transition:all var(--trans);color:var(--text2);font-size:14px;font-weight:500;white-space:nowrap;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--primary-glow);color:var(--primary);border:1px solid rgba(108,99,255,.3)}
.nav-item svg{width:18px;height:18px;flex-shrink:0}
.sidebar-footer{padding:16px 12px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:10px}
.role-select{width:100%;padding:9px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font);font-size:13px;cursor:pointer;outline:none}
.theme-btn{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text2);font-size:13px;cursor:pointer;font-family:var(--font);transition:all var(--trans);width:100%}
.theme-btn:hover{color:var(--text);border-color:var(--border2)}

/* Main */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:16px 28px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:16px}
.page-title{font-size:20px;font-weight:700}
.topbar-right{display:flex;align-items:center;gap:12px}
.role-badge{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;letter-spacing:.5px}
.role-badge.admin{background:rgba(108,99,255,.15);color:var(--primary);border:1px solid rgba(108,99,255,.3)}
.role-badge.viewer{background:rgba(59,130,246,.15);color:var(--blue);border:1px solid rgba(59,130,246,.3)}
.add-btn{display:flex;align-items:center;gap:7px;padding:9px 16px;background:var(--primary);color:#fff;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;transition:all var(--trans);font-family:var(--font)}
.add-btn:hover{background:var(--primary-dim);transform:translateY(-1px);box-shadow:0 4px 12px var(--primary-glow)}

/* Content area */
#content{flex:1;overflow-y:auto;padding:24px 28px}

/* Views */
.view{display:none;animation:fadeIn .3s ease}
.view.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Cards grid */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:transform var(--trans),box-shadow var(--trans)}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.stat-label{font-size:12px;color:var(--text2);font-weight:500;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.stat-value{font-size:28px;font-weight:700;margin-bottom:4px}
.stat-value.green{color:var(--green)}
.stat-value.red{color:var(--red)}
.stat-change{font-size:12px;color:var(--text3)}
.stat-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.stat-icon.purple{background:rgba(108,99,255,.15)}
.stat-icon.green{background:rgba(34,197,94,.15)}
.stat-icon.red{background:rgba(239,68,68,.15)}
.stat-icon.amber{background:rgba(245,158,11,.15)}

/* Charts row */
.charts-row{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:24px}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.chart-card h3{font-size:14px;font-weight:600;color:var(--text2);margin-bottom:16px;text-transform:uppercase;letter-spacing:.5px}
.chart-wrap{position:relative;height:220px}

/* Transactions */
.filters-bar{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px;align-items:center}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);width:15px;height:15px}
input[type=text],input[type=number],input[type=date],select.filter-sel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font);font-size:13px;outline:none;transition:border-color var(--trans)}
input[type=text],input[type=number],input[type=date]{padding:9px 10px}
#searchInput{padding:9px 10px 9px 34px;width:100%}
input:focus,select:focus{border-color:var(--primary)}
select.filter-sel{padding:9px 10px;cursor:pointer}
.filter-group{display:flex;align-items:center;gap:8px}
.export-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;background:var(--card2);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;transition:all var(--trans);font-family:var(--font)}
.export-btn:hover{color:var(--text);border-color:var(--primary)}

/* Table */
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{padding:12px 16px;text-align:left;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;background:var(--card2);cursor:pointer;user-select:none;white-space:nowrap}
thead th:hover{color:var(--text)}
thead th .sort-icon{opacity:.4;margin-left:4px}
thead th.sorted .sort-icon{opacity:1;color:var(--primary)}
tbody tr{border-top:1px solid var(--border);transition:background var(--trans)}
tbody tr:hover{background:var(--card2)}
tbody td{padding:13px 16px;font-size:13px}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge.income{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.2)}
.badge.expense{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.action-btn{background:none;border:none;cursor:pointer;padding:5px;border-radius:6px;transition:background var(--trans);color:var(--text3)}
.action-btn:hover{background:var(--bg3);color:var(--text)}
.action-btn.del:hover{color:var(--red)}
.empty-state{padding:60px 20px;text-align:center;color:var(--text3)}
.empty-state svg{margin-bottom:12px;opacity:.4}
.empty-state p{font-size:14px}

/* Insights */
.insights-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;margin-bottom:24px}
.insight-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.insight-card h4{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.insight-val{font-size:26px;font-weight:700;color:var(--text)}
.insight-sub{font-size:12px;color:var(--text3);margin-top:4px}
.top-cats{display:flex;flex-direction:column;gap:8px}
.top-cat-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.top-cat-label{font-size:13px;font-weight:500;flex:1}
.top-cat-bar-wrap{flex:2;background:var(--bg3);border-radius:4px;height:6px;overflow:hidden}
.top-cat-bar{height:100%;background:var(--primary);border-radius:4px;transition:width .6s ease}
.top-cat-amt{font-size:13px;font-weight:600;color:var(--text);min-width:70px;text-align:right}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity var(--trans);backdrop-filter:blur(4px)}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:28px;width:90%;max-width:480px;transform:translateY(10px) scale(.98);transition:transform var(--trans);box-shadow:var(--shadow)}
.modal-overlay.open .modal{transform:translateY(0) scale(1)}
.modal h2{font-size:18px;font-weight:700;margin-bottom:20px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-field{display:flex;flex-direction:column;gap:6px}
.form-field.full{grid-column:1/-1}
.form-field label{font-size:12px;font-weight:600;color:var(--text2)}
.form-field input,.form-field select{padding:10px 12px;border-radius:var(--radius-sm);background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:13px;font-family:var(--font)}
.form-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
.btn-cancel{padding:9px 18px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text2);cursor:pointer;font-size:13px;font-weight:600;font-family:var(--font);transition:all var(--trans)}
.btn-cancel:hover{color:var(--text)}
.btn-save{padding:9px 18px;background:var(--primary);border:none;border-radius:var(--radius-sm);color:#fff;cursor:pointer;font-size:13px;font-weight:600;font-family:var(--font);transition:all var(--trans)}
.btn-save:hover{background:var(--primary-dim)}
.toast{position:fixed;bottom:24px;right:24px;background:var(--card2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:12px 18px;font-size:13px;font-weight:500;z-index:200;transform:translateY(60px);opacity:0;transition:all .3s ease;box-shadow:var(--shadow)}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{border-color:var(--green);color:var(--green)}
.toast.error{border-color:var(--red);color:var(--red)}
#menuBtn{display:none;background:none;border:none;cursor:pointer;color:var(--text);padding:6px}

/* Responsive */
@media(max-width:900px){.charts-row{grid-template-columns:1fr}}
@media(max-width:700px){
  body{overflow:auto}
  #sidebar{position:fixed;left:-240px;top:0;bottom:0;z-index:50;transition:left .3s ease}
  #sidebar.open{left:0;box-shadow:4px 0 20px rgba(0,0,0,.4)}
  #main{width:100%}
  #menuBtn{display:block}
  #content{padding:16px}
  .cards-grid{grid-template-columns:1fr 1fr}
  .form-grid{grid-template-columns:1fr}
}
@media(max-width:480px){.cards-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- Sidebar -->
<aside id="sidebar">
  <div class="logo">
    <div class="logo-icon">💸</div>
    <span class="logo-text">FinFlow</span>
  </div>
  <nav>
    <button class="nav-item active" data-view="dashboard" onclick="navigate('dashboard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Dashboard
    </button>
    <button class="nav-item" data-view="transactions" onclick="navigate('transactions')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>
      Transactions
    </button>
    <button class="nav-item" data-view="insights" onclick="navigate('insights')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Insights
    </button>
  </nav>
  <div class="sidebar-footer">
    <select class="role-select" id="roleSelect" onchange="setRole(this.value)">
      <option value="admin">👑 Admin</option>
      <option value="viewer">👁 Viewer</option>
    </select>
    <button class="theme-btn" onclick="toggleTheme()">
      <span id="themeIcon">☀️</span>
      <span id="themeLabel">Light Mode</span>
    </button>
  </div>
</aside>

<!-- Main -->
<main id="main">
  <header class="topbar">
    <div style="display:flex;align-items:center;gap:12px">
      <button id="menuBtn" onclick="toggleSidebar()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <h1 class="page-title" id="pageTitle">Dashboard</h1>
    </div>
    <div class="topbar-right">
      <span class="role-badge admin" id="roleBadge">ADMIN</span>
      <button class="add-btn" id="addTxnBtn" onclick="openModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Transaction
      </button>
    </div>
  </header>

  <div id="content">

    <!-- Dashboard View -->
    <section class="view active" id="view-dashboard">
      <div class="cards-grid" id="statCards"></div>
      <div class="charts-row">
        <div class="chart-card">
          <h3>Balance Trend</h3>
          <div class="chart-wrap"><canvas id="lineChart"></canvas></div>
        </div>
        <div class="chart-card">
          <h3>Spending by Category</h3>
          <div class="chart-wrap"><canvas id="doughnutChart"></canvas></div>
        </div>
      </div>
    </section>

    <!-- Transactions View -->
    <section class="view" id="view-transactions">
      <div class="filters-bar">
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="searchInput" placeholder="Search transactions..." oninput="applyFilters()">
        </div>
        <select class="filter-sel" id="filterCat" onchange="applyFilters()">
          <option value="">All Categories</option>
        </select>
        <select class="filter-sel" id="filterType" onchange="applyFilters()">
          <option value="">All Types</option>
          <option value="income">Income</option>
          <option value="expense">Expense</option>
        </select>
        <button class="export-btn" onclick="exportCSV()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          CSV
        </button>
        <button class="export-btn" onclick="exportJSON()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          JSON
        </button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th onclick="sortBy('date')" id="th-date">Date <span class="sort-icon">↕</span></th>
              <th>Description</th>
              <th onclick="sortBy('category')" id="th-category">Category <span class="sort-icon">↕</span></th>
              <th>Type</th>
              <th onclick="sortBy('amount')" id="th-amount">Amount <span class="sort-icon">↕</span></th>
              <th id="actionsHeader">Actions</th>
            </tr>
          </thead>
          <tbody id="txnBody"></tbody>
        </table>
      </div>
    </section>

    <!-- Insights View -->
    <section class="view" id="view-insights">
      <div class="insights-grid" id="insightCards"></div>
      <div class="charts-row">
        <div class="chart-card">
          <h3>Monthly Income vs Expenses</h3>
          <div class="chart-wrap"><canvas id="barChart"></canvas></div>
        </div>
        <div class="chart-card">
          <h3>Top Spending Categories</h3>
          <div class="top-cats" id="topCats" style="margin-top:8px"></div>
        </div>
      </div>
    </section>

  </div>
</main>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <h2 id="modalTitle">Add Transaction</h2>
    <div class="form-grid">
      <div class="form-field full">
        <label>Description</label>
        <input type="text" id="fDesc" placeholder="e.g. Netflix subscription">
      </div>
      <div class="form-field">
        <label>Amount (₹)</label>
        <input type="number" id="fAmount" placeholder="0.00" min="0">
      </div>
      <div class="form-field">
        <label>Date</label>
        <input type="date" id="fDate">
      </div>
      <div class="form-field">
        <label>Type</label>
        <select id="fType">
          <option value="expense">Expense</option>
          <option value="income">Income</option>
        </select>
      </div>
      <div class="form-field">
        <label>Category</label>
        <select id="fCat">
          <option>Food & Dining</option>
          <option>Transport</option>
          <option>Shopping</option>
          <option>Entertainment</option>
          <option>Healthcare</option>
          <option>Utilities</option>
          <option>Salary</option>
          <option>Freelance</option>
          <option>Investment</option>
          <option>Other</option>
        </select>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveTransaction()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
const State = {
  role: 'admin',
  theme: 'dark',
  transactions: [],
  filters: { search: '', category: '', type: '' },
  sort: { field: 'date', dir: 'desc' },
  editId: null
};

// ─── Mock Data ────────────────────────────────────────────────────────────────
const SEED = [
  {id:1,desc:'Monthly Salary',amount:85000,date:'2024-03-01',type:'income',cat:'Salary'},
  {id:2,desc:'Zomato Order',amount:450,date:'2024-03-02',type:'expense',cat:'Food & Dining'},
  {id:3,desc:'Uber Ride',amount:220,date:'2024-03-03',type:'expense',cat:'Transport'},
  {id:4,desc:'Netflix',amount:649,date:'2024-03-04',type:'expense',cat:'Entertainment'},
  {id:5,desc:'Grocery Store',amount:1800,date:'2024-03-06',type:'expense',cat:'Food & Dining'},
  {id:6,desc:'Freelance Project',amount:25000,date:'2024-03-07',type:'income',cat:'Freelance'},
  {id:7,desc:'Electricity Bill',amount:2400,date:'2024-03-08',type:'expense',cat:'Utilities'},
  {id:8,desc:'Amazon Shopping',amount:3200,date:'2024-03-10',type:'expense',cat:'Shopping'},
  {id:9,desc:'Doctor Visit',amount:800,date:'2024-03-12',type:'expense',cat:'Healthcare'},
  {id:10,desc:'Swiggy Order',amount:380,date:'2024-03-13',type:'expense',cat:'Food & Dining'},
  {id:11,desc:'Mutual Fund SIP',amount:5000,date:'2024-03-14',type:'expense',cat:'Investment'},

  {id:13,desc:'Restaurant Dinner',amount:2100,date:'2024-02-05',type:'expense',cat:'Food & Dining'},

  {id:25,desc:'Grocery',amount:2100,date:'2024-01-22',type:'expense',cat:'Food & Dining'},
];

let nextId = 100;
let lineChartInst, doughnutChartInst, barChartInst;

// ─── Init ─────────────────────────────────────────────────────────────────────
function init() {
  const saved = localStorage.getItem('finflow');
  if (saved) {
    const s = JSON.parse(saved);
    State.transactions = s.transactions || SEED;
    State.role = s.role || 'admin';
    State.theme = s.theme || 'dark';
  } else {
    State.transactions = [...SEED];
  }
  applyTheme();
  applyRole();
  populateCatFilter();
  renderDashboard();
  renderInsights();
  applyFilters();
}

function persist() {
  localStorage.setItem('finflow', JSON.stringify({
    transactions: State.transactions,
    role: State.role,
    theme: State.theme
  }));
}

// ─── Navigation ───────────────────────────────────────────────────────────────
const TITLES = { dashboard: 'Dashboard', transactions: 'Transactions', insights: 'Insights' };
function navigate(view) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');
  document.querySelector(`[data-view="${view}"]`).classList.add('active');
  document.getElementById('pageTitle').textContent = TITLES[view];
  if (view === 'dashboard') renderDashboard();
  if (view === 'insights') renderInsights();
  if (window.innerWidth < 700) document.getElementById('sidebar').classList.remove('open');
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ─── Theme ────────────────────────────────────────────────────────────────────
function toggleTheme() {
  State.theme = State.theme === 'dark' ? 'light' : 'dark';
  applyTheme();
  persist();
  renderDashboard();
  renderInsights();
}
function applyTheme() {
  document.documentElement.setAttribute('data-theme', State.theme);
  document.getElementById('themeIcon').textContent = State.theme === 'dark' ? '☀️' : '🌙';
  document.getElementById('themeLabel').textContent = State.theme === 'dark' ? 'Light Mode' : 'Dark Mode';
}

// ─── Role ─────────────────────────────────────────────────────────────────────
function setRole(r) {
  State.role = r;
  applyRole();
  persist();
  applyFilters();
}
function applyRole() {
  document.getElementById('roleSelect').value = State.role;
  const badge = document.getElementById('roleBadge');
  badge.className = 'role-badge ' + State.role;
  badge.textContent = State.role.toUpperCase();
  const isAdmin = State.role === 'admin';
  document.getElementById('addTxnBtn').style.display = isAdmin ? 'flex' : 'none';
  document.getElementById('actionsHeader').style.display = isAdmin ? '' : 'none';
}

// ─── Summary ──────────────────────────────────────────────────────────────────
function getStats() {
  const txns = State.transactions;
  const income = txns.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense = txns.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const balance = income - expense;
  const savings = income > 0 ? ((balance/income)*100).toFixed(1) : 0;
  return { income, expense, balance, savings };
}

function fmt(n) {
  return '₹' + n.toLocaleString('en-IN', { maximumFractionDigits: 0 });
}

// ─── Dashboard ────────────────────────────────────────────────────────────────
function renderDashboard() {
  const { income, expense, balance, savings } = getStats();
  document.getElementById('statCards').innerHTML = `
    <div class="stat-card"><div class="stat-icon purple"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6c63ff" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg></div><div class="stat-label">Total Balance</div><div class="stat-value">${fmt(balance)}</div><div class="stat-change">All-time net</div></div>
    <div class="stat-card"><div class="stat-icon green"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg></div><div class="stat-label">Total Income</div><div class="stat-value green">${fmt(income)}</div><div class="stat-change">${State.transactions.filter(t=>t.type==='income').length} transactions</div></div>
    <div class="stat-card"><div class="stat-icon red"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg></div><div class="stat-label">Total Expenses</div><div class="stat-value red">${fmt(expense)}</div><div class="stat-change">${State.transactions.filter(t=>t.type==='expense').length} transactions</div></div>
    <div class="stat-card"><div class="stat-icon amber"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg></div><div class="stat-label">Savings Rate</div><div class="stat-value" style="color:var(--amber)">${savings}%</div><div class="stat-change">of total income</div></div>
  `;
  renderLineChart();
  renderDoughnutChart();
}

function getMonthlyData() {
  const months = {};
  State.transactions.forEach(t => {
    const m = t.date.slice(0, 7);
    if (!months[m]) months[m] = { income: 0, expense: 0 };
    months[m][t.type] += t.amount;
  });
  const sorted = Object.keys(months).sort();
  return { labels: sorted.map(m => { const d = new Date(m+'-01'); return d.toLocaleString('default',{month:'short',year:'2-digit'}); }), income: sorted.map(m=>months[m].income), expense: sorted.map(m=>months[m].expense), balance: sorted.map(m=>months[m].income-months[m].expense) };
}

function chartColors() {
  return { grid: State.theme==='dark'?'rgba(255,255,255,.06)':'rgba(0,0,0,.06)', text: State.theme==='dark'?'#8b9ab8':'#4a5568' };
}

function renderLineChart() {
  if (lineChartInst) lineChartInst.destroy();
  const md = getMonthlyData();
  const cc = chartColors();
  lineChartInst = new Chart(document.getElementById('lineChart'), {
    type: 'line',
    data: {
      labels: md.labels,
      datasets: [{
        label: 'Net Balance',
        data: md.balance,
        borderColor: '#6c63ff',
        backgroundColor: 'rgba(108,99,255,.12)',
        borderWidth: 2.5,
        fill: true,
        tension: .4,
        pointBackgroundColor: '#6c63ff',
        pointRadius: 4
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => fmt(ctx.parsed.y) } } },
      scales: {
        x: { grid: { color: cc.grid }, ticks: { color: cc.text, font: { size: 11 } } },
        y: { grid: { color: cc.grid }, ticks: { color: cc.text, font: { size: 11 }, callback: v => '₹'+v.toLocaleString('en-IN') } }
      }
    }
  });
}

function renderDoughnutChart() {
  if (doughnutChartInst) doughnutChartInst.destroy();
  const expense = State.transactions.filter(t=>t.type==='expense');
  const cats = {};
  expense.forEach(t => { cats[t.cat] = (cats[t.cat]||0) + t.amount; });
  const labels = Object.keys(cats);
  const data = labels.map(l=>cats[l]);
  const COLORS = ['#6c63ff','#22c55e','#ef4444','#f59e0b','#3b82f6','#ec4899','#8b5cf6','#14b8a6'];
  const cc = chartColors();
  doughnutChartInst = new Chart(document.getElementById('doughnutChart'), {
    type: 'doughnut',
    data: { labels, datasets: [{ data, backgroundColor: COLORS, borderWidth: 0, hoverOffset: 6 }] },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '65%',
      plugins: {
        legend: { position: 'bottom', labels: { color: cc.text, font: { size: 11 }, padding: 12, boxWidth: 10 } },
        tooltip: { callbacks: { label: ctx => ` ${ctx.label}: ${fmt(ctx.parsed)}` } }
      }
    }
  });
}

// ─── Transactions ─────────────────────────────────────────────────────────────
function populateCatFilter() {
  const cats = [...new Set(State.transactions.map(t=>t.cat))].sort();
  const sel = document.getElementById('filterCat');
  sel.innerHTML = '<option value="">All Categories</option>' + cats.map(c=>`<option>${c}</option>`).join('');
}

function applyFilters() {
  State.filters.search = document.getElementById('searchInput').value.toLowerCase();
  State.filters.category = document.getElementById('filterCat').value;
  State.filters.type = document.getElementById('filterType').value;
  renderTransactions();
}

function sortBy(field) {
  if (State.sort.field === field) State.sort.dir = State.sort.dir === 'asc' ? 'desc' : 'asc';
  else { State.sort.field = field; State.sort.dir = 'desc'; }
  document.querySelectorAll('thead th').forEach(th => th.classList.remove('sorted'));
  const th = document.getElementById('th-'+field);
  if (th) { th.classList.add('sorted'); th.querySelector('.sort-icon').textContent = State.sort.dir==='asc'?'↑':'↓'; }
  renderTransactions();
}

function renderTransactions() {
  const { search, category, type } = State.filters;
  let list = State.transactions.filter(t =>
    (!search || t.desc.toLowerCase().includes(search) || t.cat.toLowerCase().includes(search)) &&
    (!category || t.cat === category) &&
    (!type || t.type === type)
  );
  list.sort((a,b) => {
    let va = a[State.sort.field==='date'?'date':State.sort.field==='amount'?'amount':'cat'];
    let vb = b[State.sort.field==='date'?'date':State.sort.field==='amount'?'amount':'cat'];
    if (State.sort.field === 'category') { va = a.cat; vb = b.cat; }
    if (typeof va === 'string') return State.sort.dir==='asc'?va.localeCompare(vb):vb.localeCompare(va);
    return State.sort.dir === 'asc' ? va - vb : vb - va;
  });
  const isAdmin = State.role === 'admin';
  const body = document.getElementById('txnBody');
  if (!list.length) {
    body.innerHTML = `<tr><td colspan="6"><div class="empty-state"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg><p>No transactions found</p></div></td></tr>`;
    return;
  }
  body.innerHTML = list.map(t => `
    <tr>
      <td>${new Date(t.date+'T00:00:00').toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})}</td>
      <td style="font-weight:500">${t.desc}</td>
      <td><span style="background:var(--bg3);padding:3px 10px;border-radius:20px;font-size:12px">${t.cat}</span></td>
      <td><span class="badge ${t.type}">${t.type==='income'?'↑ Income':'↓ Expense'}</span></td>
      <td style="font-weight:600;color:${t.type==='income'?'var(--green)':'var(--red)'}">${t.type==='income'?'+':'-'}${fmt(t.amount)}</td>
      <td style="display:${isAdmin?'':'none'};white-space:nowrap">
        <button class="action-btn" title="Edit" onclick="editTxn(${t.id})"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
        <button class="action-btn del" title="Delete" onclick="deleteTxn(${t.id})"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg></button>
      </td>
    </tr>
  `).join('');
}

// ─── Insights ─────────────────────────────────────────────────────────────────
function renderInsights() {
  const md = getMonthlyData();
  const months = Object.keys(State.transactions.reduce((a,t)=>{a[t.date.slice(0,7)]=1;return a},{})).sort();
  const cur = months[months.length-1]||'';
  const prev = months[months.length-2]||'';
  const curExp = State.transactions.filter(t=>t.type==='expense'&&t.date.startsWith(cur)).reduce((s,t)=>s+t.amount,0);
  const prevExp = State.transactions.filter(t=>t.type==='expense'&&t.date.startsWith(prev)).reduce((s,t)=>s+t.amount,0);
  const momChange = prevExp>0 ? (((curExp-prevExp)/prevExp)*100).toFixed(1) : 0;
  const changeColor = momChange>0?'var(--red)':momChange<0?'var(--green)':'var(--text)';
  const changeLabel = momChange>0?`▲ ${momChange}% vs last month`:`▼ ${Math.abs(momChange)}% vs last month`;
  const cats = {};
  State.transactions.filter(t=>t.type==='expense').forEach(t=>{cats[t.cat]=(cats[t.cat]||0)+t.amount;});
  const topCat = Object.entries(cats).sort((a,b)=>b[1]-a[1])[0];
  const { income, expense } = getStats();
  const ratio = income>0?(expense/income*100).toFixed(1):0;
  document.getElementById('insightCards').innerHTML = `
    <div class="insight-card"><h4>Highest Spending Category</h4><div class="insight-val">${topCat?topCat[0]:'—'}</div><div class="insight-sub">${topCat?fmt(topCat[1])+' total':''}</div></div>
    <div class="insight-card"><h4>Month-over-Month</h4><div class="insight-val" style="color:${changeColor}">${momChange}%</div><div class="insight-sub">${changeLabel}</div></div>
    <div class="insight-card"><h4>Expense-to-Income Ratio</h4><div class="insight-val" style="color:${ratio>80?'var(--red)':'var(--green)'}">${ratio}%</div><div class="insight-sub">of income spent</div></div>
    <div class="insight-card"><h4>Total Transactions</h4><div class="insight-val">${State.transactions.length}</div><div class="insight-sub">${State.transactions.filter(t=>t.type==='income').length} income · ${State.transactions.filter(t=>t.type==='expense').length} expense</div></div>
  `;
  renderBarChart(md);
  renderTopCats(cats);
}

function renderBarChart(md) {
  if (barChartInst) barChartInst.destroy();
  const cc = chartColors();
  barChartInst = new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: {
      labels: md.labels,
      datasets: [
        { label: 'Income', data: md.income, backgroundColor: 'rgba(34,197,94,.7)', borderRadius: 4 },
        { label: 'Expense', data: md.expense, backgroundColor: 'rgba(239,68,68,.7)', borderRadius: 4 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color: cc.text, font: { size: 11 } } }, tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: ${fmt(ctx.parsed.y)}` } } },
      scales: {
        x: { grid: { color: cc.grid }, ticks: { color: cc.text, font: { size: 11 } } },
        y: { grid: { color: cc.grid }, ticks: { color: cc.text, font: { size: 11 }, callback: v => '₹'+v.toLocaleString('en-IN') } }
      }
    }
  });
}

function renderTopCats(cats) {
  const sorted = Object.entries(cats).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const max = sorted[0]?.[1]||1;
  document.getElementById('topCats').innerHTML = sorted.length ? sorted.map(([cat,amt],i)=>`
    <div class="top-cat-row">
      <span class="top-cat-label">${['🥇','🥈','🥉','4️⃣','5️⃣'][i]} ${cat}</span>
      <div class="top-cat-bar-wrap"><div class="top-cat-bar" style="width:${(amt/max*100).toFixed(1)}%"></div></div>
      <span class="top-cat-amt">${fmt(amt)}</span>
    </div>
  `).join('') : '<p style="color:var(--text3);font-size:13px">No expense data</p>';
}

// ─── Modal ────────────────────────────────────────────────────────────────────
function openModal(id) {
  State.editId = id || null;
  document.getElementById('modalTitle').textContent = id ? 'Edit Transaction' : 'Add Transaction';
  if (id) {
    const t = State.transactions.find(x=>x.id===id);
    document.getElementById('fDesc').value = t.desc;
    document.getElementById('fAmount').value = t.amount;
    document.getElementById('fDate').value = t.date;
    document.getElementById('fType').value = t.type;
    document.getElementById('fCat').value = t.cat;
  } else {
    document.getElementById('fDesc').value = '';
    document.getElementById('fAmount').value = '';
    document.getElementById('fDate').value = new Date().toISOString().slice(0,10);
    document.getElementById('fType').value = 'expense';
    document.getElementById('fCat').value = 'Food & Dining';
  }
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function closeModalOutside(e) { if (e.target.id==='modalOverlay') closeModal(); }

function saveTransaction() {
  const desc = document.getElementById('fDesc').value.trim();
  const amount = parseFloat(document.getElementById('fAmount').value);
  const date = document.getElementById('fDate').value;
  const type = document.getElementById('fType').value;
  const cat = document.getElementById('fCat').value;
  if (!desc || !amount || !date) { showToast('Please fill all fields', 'error'); return; }
  if (State.editId) {
    const t = State.transactions.find(x=>x.id===State.editId);
    Object.assign(t, { desc, amount, date, type, cat });
    showToast('Transaction updated ✓', 'success');
  } else {
    State.transactions.unshift({ id: nextId++, desc, amount, date, type, cat });
    showToast('Transaction added ✓', 'success');
  }
  persist();
  populateCatFilter();
  applyFilters();
  closeModal();
}

function editTxn(id) { openModal(id); }
function deleteTxn(id) {
  if (!confirm('Delete this transaction?')) return;
  State.transactions = State.transactions.filter(t=>t.id!==id);
  persist();
  populateCatFilter();
  applyFilters();
  showToast('Transaction deleted', 'success');
}

// ─── Export ───────────────────────────────────────────────────────────────────
function exportCSV() {
  const rows = [['Date','Description','Category','Type','Amount'],...State.transactions.map(t=>[t.date,t.desc,t.cat,t.type,t.amount])];
  const csv = rows.map(r=>r.join(',')).join('\n');
  download('finflow-export.csv', 'text/csv', csv);
}
function exportJSON() {
  download('finflow-export.json', 'application/json', JSON.stringify(State.transactions, null, 2));
}
function download(name, type, content) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], { type }));
  a.download = name;
  a.click();
  showToast('Exported ' + name + ' ✓', 'success');
}

// ─── Toast ────────────────────────────────────────────────────────────────────
function showToast(msg, cls='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + cls + ' show';
  setTimeout(() => t.classList.remove('show'), 2500);
}

init();
</script>
